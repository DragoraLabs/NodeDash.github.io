<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Files</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header id="header"></header>
  <main>
    <section class="card">
      <h2>Files: <code id="serverId"></code></h2>
      <div class="row">
        <input id="pathInput" type="text" value="." placeholder="Path" />
        <button id="listBtn" style="max-width: 140px;">List</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Size</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="filesBody"></tbody>
      </table>
      <p class="small" id="status"></p>
    </section>

    <section class="card">
      <h3>Upload File</h3>
      <div class="row">
        <input id="uploadPath" type="text" placeholder="Relative path, e.g. src/index.js" />
        <input id="uploadFile" type="file" />
        <button id="uploadBtn" style="max-width: 160px;">Upload</button>
      </div>

      <h3>Create Folder</h3>
      <div class="row">
        <input id="mkdirPath" type="text" placeholder="Relative path, e.g. logs" />
        <button id="mkdirBtn" style="max-width: 160px;">Create Folder</button>
      </div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script>
    const serverUuid = NodeWings.parseServerUuidFromPath();
    const statusEl = document.getElementById("status");
    document.getElementById("serverId").textContent = serverUuid || "unknown";

    function formatBytes(size) {
      if (!size) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let idx = 0;
      let value = size;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx += 1;
      }
      return `${value.toFixed(2)} ${units[idx]}`;
    }

    async function listFiles(path = ".") {
      const payload = await NodeWings.api(`/api/servers/${serverUuid}/files/list`, {
        method: "POST",
        body: { path },
      });

      const body = document.getElementById("filesBody");
      if (!payload.entries?.length) {
        body.innerHTML = '<tr><td colspan="4" class="small">No files found.</td></tr>';
        return;
      }

      body.innerHTML = payload.entries
        .map((entry) => {
          const safePath = String(entry.path).replace(/'/g, "\\'");
          return `
            <tr>
              <td>${entry.name}</td>
              <td>${entry.isDirectory ? "directory" : "file"}</td>
              <td>${entry.isDirectory ? "-" : formatBytes(entry.size)}</td>
              <td>
                <div class="row">
                  ${
                    entry.isDirectory
                      ? `<button class="secondary" onclick="listPath('${safePath}')">Open</button>`
                      : `<button class="secondary" onclick="downloadPath('${safePath}')">Download</button>`
                  }
                  <button class="danger" onclick="deletePath('${safePath}')">Delete</button>
                </div>
              </td>
            </tr>
          `;
        })
        .join("");
    }

    window.listPath = async (path) => {
      document.getElementById("pathInput").value = path;
      try {
        await listFiles(path);
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    };

    window.deletePath = async (path) => {
      if (!confirm(`Delete ${path}?`)) return;
      try {
        await NodeWings.api(`/api/servers/${serverUuid}/files/delete`, {
          method: "POST",
          body: { path },
        });
        NodeWings.showInfo(statusEl, `Deleted ${path}`);
        await listFiles(document.getElementById("pathInput").value || ".");
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    };

    window.downloadPath = async (path) => {
      try {
        const payload = await NodeWings.api(`/api/servers/${serverUuid}/files/download`, {
          method: "POST",
          body: { path },
        });
        const bytes = Uint8Array.from(atob(payload.contentBase64), (c) => c.charCodeAt(0));
        const blob = new Blob([bytes], { type: "application/octet-stream" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = path.split("/").pop();
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    };

    document.getElementById("listBtn").addEventListener("click", async () => {
      try {
        await listFiles(document.getElementById("pathInput").value || ".");
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    });

    document.getElementById("mkdirBtn").addEventListener("click", async () => {
      try {
        const path = document.getElementById("mkdirPath").value.trim();
        if (!path) throw new Error("Folder path is required");
        await NodeWings.api(`/api/servers/${serverUuid}/files/mkdir`, {
          method: "POST",
          body: { path },
        });
        NodeWings.showInfo(statusEl, `Folder created: ${path}`);
        await listFiles(document.getElementById("pathInput").value || ".");
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    });

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const path = document.getElementById("uploadPath").value.trim();
      const file = document.getElementById("uploadFile").files[0];

      try {
        if (!path) throw new Error("Upload path is required");
        if (!file) throw new Error("Choose a file first");

        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("Failed to read file"));
          reader.readAsDataURL(file);
        });

        const contentBase64 = String(dataUrl).split(",")[1];
        await NodeWings.api(`/api/servers/${serverUuid}/files/upload`, {
          method: "POST",
          body: { path, contentBase64 },
        });

        NodeWings.showInfo(statusEl, `Uploaded ${path}`);
        await listFiles(document.getElementById("pathInput").value || ".");
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    });

    (async () => {
      const user = await NodeWings.initPage("Files");
      if (!user) return;
      NodeWings.renderHeader(`Files (${user.email})`);

      if (!serverUuid) {
        NodeWings.showError(statusEl, "Missing server UUID in URL");
        return;
      }

      try {
        await listFiles(".");
      } catch (error) {
        NodeWings.showError(statusEl, error.message);
      }
    })();
  </script>
</body>
</html>
