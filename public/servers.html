<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NodeWings Servers</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header id="header"></header>
  <main>
    <section class="card">
      <div class="row" style="justify-content: space-between; align-items: center;">
        <h2>Servers</h2>
        <a href="/servers/create"><button>Create Server</button></a>
      </div>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>UUID</th>
            <th>Node</th>
            <th>Status</th>
            <th>RAM</th>
            <th>CPU</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="serversBody"></tbody>
      </table>
      <p class="small" id="status"></p>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script>
    function statusTag(status) {
      if (status === "running") return '<span class="tag ok">running</span>';
      if (status === "starting" || status === "restarting") return '<span class="tag muted">' + status + '</span>';
      if (status === "stopped") return '<span class="tag bad">stopped</span>';
      return '<span class="tag muted">' + (status || "unknown") + '</span>';
    }

    async function actionServer(uuid, action) {
      await NodeWings.api(`/api/servers/${uuid}/actions/${action}`, { method: "POST" });
      await loadServers();
    }

    function actionButtons(server) {
      return `
        <div class="row">
          <button onclick="runAction('${server.uuid}','start')">Start</button>
          <button class="secondary" onclick="runAction('${server.uuid}','stop')">Stop</button>
          <button class="secondary" onclick="runAction('${server.uuid}','restart')">Restart</button>
          <a href="/servers/${server.uuid}/console"><button class="secondary">Console</button></a>
          <a href="/servers/${server.uuid}/files"><button class="secondary">Files</button></a>
          <a href="/servers/${server.uuid}/resources"><button class="secondary">Resources</button></a>
        </div>
      `;
    }

    async function loadServers() {
      const payload = await NodeWings.api("/api/servers");
      const body = document.getElementById("serversBody");

      if (!payload.servers.length) {
        body.innerHTML = '<tr><td colspan="7" class="small">No servers yet.</td></tr>';
        return;
      }

      body.innerHTML = payload.servers
        .map((server) => `
          <tr>
            <td>${server.name}</td>
            <td><code>${server.uuid}</code></td>
            <td><code>${server.nodeId}</code></td>
            <td>${statusTag(server.status)}</td>
            <td>${server.ramLimitMb} MB</td>
            <td>${server.cpuLimitPercent}%</td>
            <td>${actionButtons(server)}</td>
          </tr>
        `)
        .join("");
    }

    window.runAction = async (uuid, action) => {
      const statusEl = document.getElementById("status");
      try {
        statusEl.textContent = `${action} request sent...`;
        await actionServer(uuid, action);
        statusEl.textContent = `${action} completed at ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        statusEl.textContent = `Error: ${error.message}`;
      }
    };

    (async () => {
      const user = await NodeWings.initPage("Servers");
      if (!user) return;

      try {
        await loadServers();
      } catch (error) {
        document.getElementById("status").textContent = error.message;
      }

      setInterval(async () => {
        try {
          await loadServers();
        } catch {}
      }, 5000);
    })();
  </script>
</body>
</html>
